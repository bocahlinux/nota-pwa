name: CI/CD — Nota

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ── Backend Tests ──────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        working-directory: ./backend
        run: python manage.py migrate --noinput
        env:
          DJANGO_SECRET_KEY: ci-test-key-not-for-production
          DJANGO_DEBUG: 'True'

      - name: Run tests
        working-directory: ./backend
        run: python manage.py test notes accounts --verbosity=2
        env:
          DJANGO_SECRET_KEY: ci-test-key-not-for-production
          DJANGO_DEBUG: 'True'

      - name: Django system check
        working-directory: ./backend
        run: python manage.py check --deploy
        env:
          DJANGO_SECRET_KEY: ci-test-key-not-for-production
          DJANGO_DEBUG: 'False'

  # ── Frontend Build ─────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        run: npx vite build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── Deploy (Production) ───────────────────────────────
  deploy:
    name: Deploy to Production
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /var/www/nota
            git pull origin main
            source venv/bin/activate
            cd backend && pip install -r requirements.txt --quiet
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            deactivate
            cd ../frontend && npm ci --silent && npx vite build
            sudo systemctl restart nota-backend
            sudo systemctl reload nginx
            echo "Deployed at $(date)"
